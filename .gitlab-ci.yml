# ═══════════════════════════════════════════════════════════════
# Teamwise Frontend — GitLab CI/CD
# ═══════════════════════════════════════════════════════════════

stages:
  - test
  - build
  - deploy

cache:
  key: node-${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

# ── TEST (typecheck + lint) ───────────────────────────────────
test:
  stage: test
  image: node:20-alpine
  script:
    - npm ci --prefer-offline
    - npx tsc -b
    - npm run lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# ── BUILD ─────────────────────────────────────────────────────
build:
  stage: build
  image: node:20-alpine
  variables:
    VITE_API_URL: $VITE_API_URL
  script:
    - npm ci --prefer-offline
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

